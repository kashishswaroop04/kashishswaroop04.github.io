<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Introduction Form</title>
    <link rel="stylesheet" href="styles/default.css">
</head>

<body>
<header></header>

<main>
    <h2>Introduction Form</h2>
    <h3>Please submit the form below.</h3>

    <form id="form">

        <!-- Basic Info -->
        <label>First Name:</label>
        <input type="text" name="firstName" value="YourName" required>

        <label>Middle Name (Optional):</label>
        <input type="text" name="middleName">

        <label>Nickname (Optional):</label>
        <input type="text" name="nickname">

        <label>Last Name:</label>
        <input type="text" name="lastName" required>

        <label>Date:</label>
        <input type="date" name="date" required>

        <label>Mascot Adjective:</label>
        <input type="text" name="mascotAdj" required>

        <label>Mascot Animal:</label>
        <input type="text" name="mascotAnimal" required>

        <label>Divider:</label>
        <input type="text" name="divider" value="~" required>

        <!-- Image -->
        <label>Upload Image:</label>
        <input type="file" name="image" accept="image/*">

        <label>Image Caption:</label>
        <input type="text" name="imageCaption" required>

        <!-- Statements -->
        <label>Personal Statement:</label>
        <textarea name="personalStatement" required></textarea>

        <label>Personal Background:</label>
        <textarea name="personalBg"></textarea>

        <label>Academic Background:</label>
        <textarea name="academicBg"></textarea>

        <label>Professional Background:</label>
        <textarea name="professionalBg"></textarea>

        <label>Subject Background:</label>
        <textarea name="subjectBg"></textarea>

        <!-- Quote -->
        <label>Quote:</label>
        <input type="text" name="quote" required>

        <label>Quote Author:</label>
        <input type="text" name="quoteAuthor" required>

        <!-- Optional -->
        <label>Funny Thing:</label>
        <textarea name="funny"></textarea>

        <label>Something to Share:</label>
        <textarea name="share"></textarea>

        <!-- Links -->
        <label>Links:</label>
        <input type="url" name="link1">
        <input type="url" name="link2">
        <input type="url" name="link3">
        <input type="url" name="link4">
        <input type="url" name="link5">

        <!-- Courses -->
        <h3>Courses</h3>
        <div id="courses"></div>

        <button type="button" id="addCourse">Add Course</button>

        <br><br>

        <!-- Buttons -->
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        <button type="button" id="clearBtn">Clear</button>

    </form>
</main>

<footer></footer>

<script src="scripts/introduction.js"></script>
</body>
</html>
